# Single-server nginx: serves the React build AND proxies the API on one domain.
#
#   /        → static Vite build in /var/www/vedicpatro  (SPA, client-side routing)
#   /api/*   → FastAPI on 127.0.0.1:8000 (prefix stripped)
#
# Install:
#   sudo cp deploy/nginx-vedicpatro.conf /etc/nginx/sites-available/vedicpatro
#   sudo ln -sf /etc/nginx/sites-available/vedicpatro /etc/nginx/sites-enabled/vedicpatro
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then issue TLS (adds the :443 block + http→https redirect automatically):
#   sudo certbot --nginx -d vedicpatro.com -d www.vedicpatro.com

server {
    listen 80;
    listen [::]:80;
    server_name vedicpatro.com www.vedicpatro.com;

    # Built React app (output of `npm run build`).
    root /var/www/vedicpatro;
    index index.html;

    # Cap upload/body size for API requests.
    client_max_body_size 2m;

    # ─── API → FastAPI ───────────────────────────────────────────────────────
    # Trailing slash on proxy_pass strips the "/api/" prefix:
    #   /api/auth/signup  →  http://127.0.0.1:8000/auth/signup
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        # Streaming endpoints (e.g. /kundali/report NDJSON) need buffering off.
        proxy_buffering off;
    }

    # ─── Static assets — long cache (filenames are content-hashed) ───────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── SPA — serve the file if it exists, else hand off to index.html so
    #         client-side routes like /account and /kundali work on refresh. ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
